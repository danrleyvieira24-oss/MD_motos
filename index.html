<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Roleta MD 2 Rodas</title>

<style>
body{
    background: radial-gradient(circle,#0b1d3a,#061224);
    text-align:center;
    font-family:Arial, sans-serif;
    color:white;
}

h1{font-size:40px;margin-top:20px;}

#container{
    position:relative;
    width:420px;
    margin:20px auto;
}

canvas{
    border-radius:50%;
    box-shadow:0 0 40px gold;
    transition:transform 0.3s;
}

/* Ponteiro fixo */
#ponteiro{
    position:absolute;
    bottom:-5px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:35px solid red;
}

/* Logo central */
#logoCentro{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

#logoCentro img{
    width:85%;
}

/* Luz piscando */
@keyframes piscar{
    0%{box-shadow:0 0 20px gold;}
    50%{box-shadow:0 0 60px yellow;}
    100%{box-shadow:0 0 20px gold;}
}

.luzAtiva{
    animation:piscar 0.6s infinite;
}

button{
    margin-top:20px;
    padding:15px 40px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ccc;
    cursor:pointer;
}

#resultado{
    margin-top:20px;
    font-size:26px;
}
</style>
</head>
<body>

<h1>🎉 MÊS DO CONSUMIDOR</h1>
<h2>MD 2 Rodas</h2>

<div id="container">
    <canvas id="roleta" width="400" height="400"></canvas>
    <div id="ponteiro"></div>

    <div id="logoCentro">
        <img src="logo.png">
    </div>
</div>

<button onclick="girar()" id="btnGirar">GIRAR ROLETA</button>

<div id="resultado"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let canvas=document.getElementById("roleta");
let ctx=canvas.getContext("2d");

let premios=[
    {nome:"R$300 Desconto", peso:1},
    {nome:"Revisão Básica Grátis", peso:2},
    {nome:"Entrega Grátis", peso:2},
    {nome:"Tanque Cheio", peso:2},
    {nome:"Parcelamento Facilitado", peso:3},
    {nome:"Capacete + Óleo", peso:2}
];

let cores=["#2b9ed1","#28a745","#3366cc","#f4a300","#8e3fd1","#e62222"];

let total=premios.length;
let graus=360/total;
let rotacaoAtual=0;
let girando=false;

function desenhar(){
    for(let i=0;i<total;i++){
        ctx.beginPath();
        ctx.moveTo(200,200);
        ctx.arc(200,200,200,i*graus*Math.PI/180,(i+1)*graus*Math.PI/180);
        ctx.fillStyle=cores[i];
        ctx.fill();

        ctx.save();
        ctx.translate(200,200);
        ctx.rotate((i*graus+graus/2)*Math.PI/180);
        ctx.fillStyle="white";
        ctx.font="bold 14px Arial";
        ctx.textAlign="right";
        ctx.fillText(premios[i].nome,170,5);
        ctx.restore();
    }
}

desenhar();

function sorteio(){
    let totalPeso=premios.reduce((s,p)=>s+p.peso,0);
    let r=Math.random()*totalPeso;
    let soma=0;
    for(let i=0;i<premios.length;i++){
        soma+=premios[i].peso;
        if(r<soma) return i;
    }
}

let audioCtx=new (window.AudioContext||window.webkitAudioContext)();

function tic(){
    let osc=audioCtx.createOscillator();
    osc.type="square";
    osc.frequency.setValueAtTime(800,audioCtx.currentTime);
    osc.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime+0.05);
}

function vitoria(){
    let osc=audioCtx.createOscillator();
    osc.type="triangle";
    osc.frequency.setValueAtTime(300,audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(900,audioCtx.currentTime+0.6);
    osc.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime+0.6);
}

function girar(){
if(girando)return;
girando=true;
document.getElementById("btnGirar").disabled=true;
audioCtx.resume();

let indice=sorteio();

let anguloCentro=(indice*graus)+(graus/2);

/* 🔥 CORREÇÃO DEFINITIVA PARA PONTEIRO EMBAIXO */
let destino=270-anguloCentro; 

let giros=360*6;
let destinoFinal=rotacaoAtual+giros+destino;

let inicio=null;
let duracao=4500;
let ultimoTick=-1;

canvas.classList.add("luzAtiva");

function animar(t){
if(!inicio)inicio=t;
let prog=t-inicio;
let p=Math.min(prog/duracao,1);
let ease=1-Math.pow(1-p,3);

let rot=rotacaoAtual+(destinoFinal-rotacaoAtual)*ease;
canvas.style.transform=`rotate(${rot}deg)`;

let divisao=Math.floor((rot%360)/graus);
if(divisao!=ultimoTick){
tic();
ultimoTick=divisao;
}

if(prog<duracao){
requestAnimationFrame(animar);
}else{
rotacaoAtual=destinoFinal%360;
canvas.classList.remove("luzAtiva");

document.getElementById("resultado").innerHTML=
"🏆 Você ganhou:<br>"+premios[indice].nome;

if(indice===0){
vitoria();
confetti({particleCount:200,spread:100});
}

girando=false;
document.getElementById("btnGirar").disabled=false;
}
}
requestAnimationFrame(animar);
}
</script>

</body>
</html>
